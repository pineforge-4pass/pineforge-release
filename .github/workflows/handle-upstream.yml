name: handle-upstream

# Inbound hub handler. Fired by an upstream release:
#   pineforge-engine      release.yml -> event_type=engine-release  {version: vX.Y.Z, run_id}
#   pineforge-codegen-oss release.yml -> event_type=codegen-release {version: X.Y.Z, run_id}
#
# Bumps the matching pin in docker/Dockerfile, patch-bumps THIS repo's VERSION,
# commits + tags with the org GitHub App token. The App-token-pushed tag fires
# publish.yml (build the combined image -> fan out to the MCPs). A GITHUB_TOKEN-
# pushed tag would NOT re-trigger publish.yml; the App token (a non-default
# credential) does. Idempotent, with half-failed-release recovery, a downgrade
# guard, and serialized concurrency.

on:
  repository_dispatch:
    types: [engine-release, codegen-release]

concurrency:
  group: handle-upstream
  cancel-in-progress: false

permissions:
  contents: read   # GITHUB_TOKEN stays read-only; the App token does the push.

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Mint org App token
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PINEFORGE_APP_ID }}
          private-key: ${{ secrets.PINEFORGE_APP_PRIVATE_KEY }}

      - name: Checkout main (App token bypasses the ruleset + re-fires publish.yml)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app.outputs.token }}

      - name: Validate payload
        id: in
        env:
          EVENT: ${{ github.event.action }}
          RAW_VERSION: ${{ github.event.client_payload.version }}
          RUN_ID: ${{ github.event.client_payload.run_id }}
        run: |
          set -euo pipefail
          # client_payload is ATTACKER-CONTROLLABLE -> strict allowlist before it
          # reaches a build-arg / pip pin / image ref / tag message.
          case "$EVENT" in
            engine-release)  component=engine ;;
            codegen-release) component=codegen ;;
            *) echo "::error::unexpected event '$EVENT'"; exit 1 ;;
          esac
          if ! printf '%s' "${RAW_VERSION:-}" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$'; then
            echo "::error::rejected untrusted version '${RAW_VERSION:-}'"; exit 1
          fi
          if [ -n "${RUN_ID:-}" ] && ! printf '%s' "$RUN_ID" | grep -Eq '^[0-9]+$'; then
            echo "::error::bad run_id '${RUN_ID}'"; exit 1
          fi
          VER="${RAW_VERSION#v}"   # bare semver
          { echo "component=$component"; echo "version=$VER"; } >> "$GITHUB_OUTPUT"
          echo "dispatched ${component}=${VER} (event ${EVENT}, upstream run ${RUN_ID:-n/a})"

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Log in to GHCR (read, for the image-exists probe)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # COUPLED-BUMP: the dispatched component = the payload version; the OTHER
      # component is FROZEN at whatever the last release shipped. The pins live in
      # the latest tag's annotated message (engine=/codegen=); for the one-time
      # bootstrap off a pre-redesign tag (no such lines) we read the frozen value
      # from that tag's committed docker/Dockerfile ARG. No source pin is written.
      - name: Resolve full (engine, codegen) pin pair
        id: pins
        env:
          COMPONENT: ${{ steps.in.outputs.component }}
          VER:       ${{ steps.in.outputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -1)"
          msg() { [ -n "$LATEST" ] && git for-each-ref --format='%(contents:body)' "refs/tags/$LATEST" | sed -n "s/^$1=//p" | head -1 || true; }
          # bootstrap: pre-redesign tags still carry the committed ARG pin.
          oldpin() { [ -n "$LATEST" ] && git show "$LATEST:docker/Dockerfile" 2>/dev/null | sed -n -E "s/^ARG $1=([0-9][^[:space:]]*)$/\1/p" | head -1 || true; }
          Eprev="$(msg engine)";  [ -n "$Eprev" ] || Eprev="$(oldpin ENGINE_VERSION)"
          Cprev="$(msg codegen)"; [ -n "$Cprev" ] || Cprev="$(oldpin CODEGEN_VERSION)"
          if [ "$COMPONENT" = engine ]; then E="$VER"; C="$Cprev"; else C="$VER"; E="$Eprev"; fi
          [ -n "$E" ] && [ -n "$C" ] || { echo "::error::could not resolve frozen component (engine='$E' codegen='$C'); LATEST='$LATEST'"; exit 1; }
          for v in "$E" "$C"; do
            printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$' || { echo "::error::resolved bad version '$v'"; exit 1; }
          done
          { echo "engine=$E"; echo "codegen=$C"; echo "eprev=$Eprev"; echo "cprev=$Cprev"; } >> "$GITHUB_OUTPUT"
          echo "pins: engine ${Eprev:-∅}->${E}, codegen ${Cprev:-∅}->${C}"

      - name: Decide action (idempotent + recover half-failed release + downgrade guard)
        id: decide
        env:
          COMPONENT: ${{ steps.in.outputs.component }}
          E:      ${{ steps.pins.outputs.engine }}
          C:      ${{ steps.pins.outputs.codegen }}
          EPREV:  ${{ steps.pins.outputs.eprev }}
          CPREV:  ${{ steps.pins.outputs.cprev }}
          FORCE:  ${{ github.event.client_payload.force }}
        run: |
          set -euo pipefail
          ver="$(tr -d '[:space:]' < VERSION)"
          img="ghcr.io/pineforge-4pass/pineforge-release:${ver}"
          img_exists() { docker manifest inspect "$img" >/dev/null 2>&1; }
          # Monotonicity (downgrade) guard on the DISPATCHED component only.
          is_older() { [ -n "$2" ] && [ "$1" != "$2" ] && [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -n1)" = "$1" ]; }
          if [ "$COMPONENT" = engine ]; then dnew="$E"; dprev="$EPREV"; else dnew="$C"; dprev="$CPREV"; fi
          if is_older "$dnew" "$dprev" && [ "${FORCE:-}" != "true" ]; then
            echo "::error::refusing downgrade ${COMPONENT} ${dprev} -> ${dnew} (set client_payload.force=true to override)"; exit 1
          fi
          if [ "$E" = "$EPREV" ] && [ "$C" = "$CPREV" ]; then
            if img_exists; then mode=noop; else mode=republish; fi
          else
            mode=bump
          fi
          { echo "mode=$mode"; echo "cur_ver=$ver"; } >> "$GITHUB_OUTPUT"
          echo "mode=$mode (engine ${EPREV:-∅}->${E}, codegen ${CPREV:-∅}->${C}; VERSION ${ver})"

      - name: No-op
        if: steps.decide.outputs.mode == 'noop'
        run: echo "engine+codegen unchanged and image exists — nothing to do."

      - name: Re-publish (recover a half-failed prior release)
        if: steps.decide.outputs.mode == 'republish'
        env:
          TAG: v${{ steps.decide.outputs.cur_ver }}
        run: |
          set -euo pipefail
          echo "versions unchanged but image missing — re-pushing ${TAG} to re-fire publish.yml"
          git push origin "refs/tags/${TAG}" --force

      - name: Bump VERSION, commit, tag (fires publish.yml)
        if: steps.decide.outputs.mode == 'bump'
        env:
          E:     ${{ steps.pins.outputs.engine }}
          C:     ${{ steps.pins.outputs.codegen }}
        run: |
          set -euo pipefail
          # Patch-bump this repo's own version; skip any pre-existing tag.
          cur="$(tr -d '[:space:]' < VERSION)"
          [[ "$cur" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]] || { echo "::error::VERSION malformed '$cur'"; exit 1; }
          maj="${BASH_REMATCH[1]}"; min="${BASH_REMATCH[2]}"; pat="${BASH_REMATCH[3]}"
          git fetch --tags --quiet
          next="${maj}.${min}.$((pat + 1))"
          while git rev-parse -q --verify "refs/tags/v${next}" >/dev/null; do
            pat=$((pat + 1)); next="${maj}.${min}.$((pat + 1))"
          done
          printf '%s\n' "$next" > VERSION
          # No source pin is written — the (engine, codegen) pair is recorded in the
          # IMMUTABLE annotated tag message (read back by publish.yml) + image labels.
          git add VERSION
          git diff --cached --quiet && { echo "::error::nothing staged — refusing empty release"; exit 1; }
          git commit -m "chore(release): v${next} — engine ${E} + codegen ${C}"
          git tag -a "v${next}" -m "$(printf 'pineforge-release v%s\n\nengine=%s\ncodegen=%s\n' "$next" "$E" "$C")"
          git push origin HEAD:main
          git push origin "v${next}"
          echo "pushed v${next} (engine ${E} + codegen ${C}); publish.yml will build + fan out."
