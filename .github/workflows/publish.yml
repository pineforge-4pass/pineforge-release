name: publish

# Build + push the combined pineforge-release image, then fan out to the MCPs.
# Fires on the v* tag that handle-upstream.yml pushes with the App token (or a
# manual tag). The tag value equals VERSION (asserted below).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # gh release create
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}   # pineforge-4pass/pineforge-release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert tag matches VERSION
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          file="$(tr -d '[:space:]' < VERSION)"
          [ "${TAG#v}" = "$file" ] || { echo "::error::tag ${TAG} != VERSION ${file}"; exit 1; }

      - name: Read pins (from the annotated tag message; fallback = resolve latest)
        id: pins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          semver() { printf '%s' "$1" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$'; }
          # actions/checkout@v4 re-points refs/tags/<tag> at the COMMIT it peels to,
          # so cat-file would see 'commit' and we'd never read the annotated message.
          # Re-fetch tags (forced) to restore the annotated tag objects.
          git fetch --force --tags origin >/dev/null 2>&1 || true
          e=""; c=""
          # Trust the tag message ONLY if REF is an ANNOTATED tag — a lightweight
          # tag's %(contents:body) leaks the target commit body, not our keys.
          if [ "$(git cat-file -t "$REF" 2>/dev/null || true)" = tag ]; then
            e="$(git for-each-ref --format='%(contents:body)' "refs/tags/$REF" | sed -n 's/^engine=//p'  | head -1)"
            c="$(git for-each-ref --format='%(contents:body)' "refs/tags/$REF" | sed -n 's/^codegen=//p' | head -1)"
          fi
          if ! semver "$e" || ! semver "$c"; then
            echo "::warning::tag ${REF} lacks valid engine=/codegen= in its message — resolving latest (manual-tag path)"
            for i in 1 2 3 4 5; do e="$(gh release view -R pineforge-4pass/pineforge-engine --json tagName -q .tagName 2>/dev/null || true)"; [ -n "$e" ] && break; sleep 5; done
            e="${e#v}"
            for i in 1 2 3 4 5; do c="$(curl -fsSL https://pypi.org/pypi/pineforge-codegen/json 2>/dev/null | python3 -c 'import sys,json;print(json.load(sys.stdin)["info"]["version"])' 2>/dev/null || true)"; [ -n "$c" ] && break; sleep 5; done
          fi
          semver "$e" || { echo "::error::bad engine version '$e'"; exit 1; }
          semver "$c" || { echo "::error::bad codegen version '$c'"; exit 1; }
          { echo "engine=$e"; echo "codegen=$c"; } >> "$GITHUB_OUTPUT"
          echo "pins: engine=$e codegen=$c"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for upstream artifacts (engine tarballs + codegen on PyPI)
        env:
          E: ${{ steps.pins.outputs.engine }}
          C: ${{ steps.pins.outputs.codegen }}
        run: |
          set -euo pipefail
          # The Dockerfile builds FROM the engine static-lib tarball (per arch),
          # not a Docker image. Confirm both arch tarballs + the codegen version
          # are published before building (the build fetch fails loud anyway).
          base="https://github.com/pineforge-4pass/pineforge-engine/releases/download/v${E}"
          ok=
          for i in $(seq 1 20); do
            if curl -fsIL "${base}/pineforge-v${E}-linux-x86_64.tar.gz"  >/dev/null 2>&1 \
               && curl -fsIL "${base}/pineforge-v${E}-linux-aarch64.tar.gz" >/dev/null 2>&1 \
               && pip index versions pineforge-codegen 2>/dev/null | grep -qF "${C}"; then
              ok=1; break
            fi
            echo "waiting for engine ${E} tarballs + codegen ${C} ... (${i})"
            sleep 15
          done
          [ -n "$ok" ] || { echo "::error::engine ${E} tarballs or codegen ${C} not available after wait"; exit 1; }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=raw,value=latest
            type=raw,value=engine${{ steps.pins.outputs.engine }}-codegen${{ steps.pins.outputs.codegen }}
            type=sha,format=short

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENGINE_VERSION=${{ steps.pins.outputs.engine }}
            CODEGEN_VERSION=${{ steps.pins.outputs.codegen }}
            RELEASE_VERSION=${{ github.ref_name }}
            RELEASE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          E: ${{ steps.pins.outputs.engine }}
          C: ${{ steps.pins.outputs.codegen }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016  # backticks here are literal markdown, not command substitution
          notes="$(printf 'Combined PineScript -> backtest image.\n\nengine %s + codegen %s\n\n```\ndocker pull ghcr.io/pineforge-4pass/pineforge-release:%s\n```\n' "$E" "$C" "${TAG#v}")"
          gh release create "$TAG" --title "$TAG" --verify-tag --notes "$notes"

  notify-mcps:
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [pineforge-codegen-mcp, pineforge-mcp-public]
    steps:
      - name: Mint App token (scoped to one target)
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PINEFORGE_APP_ID }}
          private-key: ${{ secrets.PINEFORGE_APP_PRIVATE_KEY }}
          owner: pineforge-4pass
          repositories: ${{ matrix.repo }}

      - name: Dispatch pineforge-release -> ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ matrix.repo }}
          TAG: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          gh api repos/pineforge-4pass/"${REPO}"/dispatches \
            -f event_type=pineforge-release \
            -F "client_payload[release_version]=${TAG#v}" \
            -F "client_payload[run_id]=${RUN_ID}"
          echo "dispatched pineforge-release -> ${REPO} (${TAG#v})"
