name: publish

# Build + push the combined pineforge-release image, then fan out to the MCPs.
# Fires on the v* tag that handle-upstream.yml pushes with the App token (or a
# manual tag). The tag value equals VERSION (asserted below).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # gh release create
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}   # pineforge-4pass/pineforge-release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert tag matches VERSION
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          file="$(tr -d '[:space:]' < VERSION)"
          [ "${TAG#v}" = "$file" ] || { echo "::error::tag ${TAG} != VERSION ${file}"; exit 1; }

      - name: Read pins
        id: pins
        run: |
          set -euo pipefail
          e="$(grep -m1 '^ARG ENGINE_VERSION='  docker/Dockerfile | sed -E 's/^ARG ENGINE_VERSION=//'  | tr -d '[:space:]')"
          c="$(grep -m1 '^ARG CODEGEN_VERSION=' docker/Dockerfile | sed -E 's/^ARG CODEGEN_VERSION=//' | tr -d '[:space:]')"
          [ -n "$e" ] && [ -n "$c" ] || { echo "::error::could not read pins"; exit 1; }
          { echo "engine=$e"; echo "codegen=$c"; } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for upstream artifacts (engine tarballs + codegen on PyPI)
        env:
          E: ${{ steps.pins.outputs.engine }}
          C: ${{ steps.pins.outputs.codegen }}
        run: |
          set -euo pipefail
          # The Dockerfile builds FROM the engine static-lib tarball (per arch),
          # not a Docker image. Confirm both arch tarballs + the codegen version
          # are published before building (the build fetch fails loud anyway).
          base="https://github.com/pineforge-4pass/pineforge-engine/releases/download/v${E}"
          ok=
          for i in $(seq 1 20); do
            if curl -fsIL "${base}/pineforge-v${E}-linux-x86_64.tar.gz"  >/dev/null 2>&1 \
               && curl -fsIL "${base}/pineforge-v${E}-linux-aarch64.tar.gz" >/dev/null 2>&1 \
               && pip index versions pineforge-codegen 2>/dev/null | grep -qF "${C}"; then
              ok=1; break
            fi
            echo "waiting for engine ${E} tarballs + codegen ${C} ... (${i})"
            sleep 15
          done
          [ -n "$ok" ] || { echo "::error::engine ${E} tarballs or codegen ${C} not available after wait"; exit 1; }

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
            type=raw,value=latest
            type=raw,value=engine${{ steps.pins.outputs.engine }}-codegen${{ steps.pins.outputs.codegen }}
            type=sha,format=short

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ENGINE_VERSION=${{ steps.pins.outputs.engine }}
            CODEGEN_VERSION=${{ steps.pins.outputs.codegen }}
            RELEASE_VERSION=${{ github.ref_name }}
            RELEASE_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          E: ${{ steps.pins.outputs.engine }}
          C: ${{ steps.pins.outputs.codegen }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016  # backticks here are literal markdown, not command substitution
          notes="$(printf 'Combined PineScript -> backtest image.\n\nengine %s + codegen %s\n\n```\ndocker pull ghcr.io/pineforge-4pass/pineforge-release:%s\n```\n' "$E" "$C" "${TAG#v}")"
          gh release create "$TAG" --title "$TAG" --verify-tag --notes "$notes"

  notify-mcps:
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [pineforge-codegen-mcp, pineforge-mcp-public]
    steps:
      - name: Mint App token (scoped to one target)
        id: app
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PINEFORGE_APP_ID }}
          private-key: ${{ secrets.PINEFORGE_APP_PRIVATE_KEY }}
          owner: pineforge-4pass
          repositories: ${{ matrix.repo }}

      - name: Dispatch pineforge-release -> ${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          REPO: ${{ matrix.repo }}
          TAG: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          gh api repos/pineforge-4pass/"${REPO}"/dispatches \
            -f event_type=pineforge-release \
            -F "client_payload[release_version]=${TAG#v}" \
            -F "client_payload[run_id]=${RUN_ID}"
          echo "dispatched pineforge-release -> ${REPO} (${TAG#v})"
